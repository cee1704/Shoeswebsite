
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sneaker Head India | Premium Sneakers</title>

<meta name="description"
content="Shop premium sneakers in India. Wishlist, cart, ratings, and secure checkout available.">

<link rel="shortcut icon" href="image/logo.jpg">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-80KCM8C0QN"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-80KCM8C0QN');
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, Arial, sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg,#ff3c3c,#ff7a18);
min-height:100vh;
color:#111;
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
box-shadow:0 5px 20px rgba(0,0,0,.15);
position:sticky;
top:0;
z-index:1000;
}

.brand h1{
font-size:28px;
font-weight:900;
}

.brand span{
color:#c40000;
}

.nav-links{
list-style:none;
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
font-weight:700;
padding:8px 12px;
border-radius:8px;
color:#111;
transition:.3s;
}

.nav-links a:hover,
.nav-links a.active{
background:#ffe5e5;
color:#c40000;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:24px;
cursor:pointer;
}

@media(max-width:768px){

.menu-btn{
display:block;
}

.nav-links{
position:absolute;
top:70px;
left:0;
width:100%;
background:white;
flex-direction:column;
align-items:center;
display:none;
padding:20px;
}

.nav-links.show{
display:flex;
}

}

/* ICONS */

.nav-icons{
display:flex;
gap:18px;
align-items:center;
}

.icon-btn{
background:none;
border:none;
font-size:22px;
cursor:pointer;
position:relative;
}

.badge{
position:absolute;
top:-6px;
right:-8px;
background:#c40000;
color:#fff;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

/* DROPDOWN */

.dropdown{
display:none;
position:absolute;
right:10px;
top:65px;
width:90vw;
max-width:260px;
background:#fff;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
padding:12px;
}

.dropdown.show{
display:block;
}

.dropdown ul{
list-style:none;
}

.dropdown li{
display:flex;
gap:10px;
padding:8px 0;
border-bottom:1px solid #eee;
}

.dropdown img{
width:40px;
height:40px;
object-fit:contain;
}

.total{
text-align:right;
font-weight:bold;
margin-top:8px;
}

/* BUTTON */

.primary-btn{
background:#c40000;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.primary-btn:hover{
background:#900000;
transform:translateY(-2px);
box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

/* MAIN */

main{
padding:40px 8%;
}

/* PRODUCTS */

.products{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
animation:fadeIn 1s ease;
}

.products h2{
text-align:center;
font-size:2rem;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

/* PRODUCT CARD */

.card{
background:#fafafa;
border-radius:16px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 30px rgba(0,0,0,.2);
}

.card-img{
height:220px;
position:relative;
}

.card-img img{
width:100%;
height:100%;
object-fit:contain;
padding:15px;
transition:0.4s;
}

.card:hover img{
transform:scale(1.1) rotate(-5deg);
}

.like-btn{
position:absolute;
top:10px;
right:12px;
background:none;
border:none;
font-size:22px;
color:#aaa;
cursor:pointer;
}

.like-btn.active{
color:#c40000;
}

.card-body{
padding:16px;
text-align:center;
}

.price{
color:#c40000;
font-weight:bold;
margin:6px 0;
}

/* FEEDBACK */

.feedback{
display:none;
background:white;
padding:30px;
border-radius:16px;
max-width:500px;
margin:40px auto;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.feedback form{
display:flex;
flex-direction:column;
gap:14px;
}

.feedback input,
.feedback textarea{
padding:12px;
border-radius:8px;
border:1px solid #aaa;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<nav class="navbar">

<div class="brand">
<h1>SHOE<span>S</span></h1>
</div>

<i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="main_product.html" class="active">Products</a></li>
<li><a href="About.html">About</a></li>
<li><a href="Reviews.html">Reviews</a></li>
</ul>

<div class="nav-icons">

<button class="icon-btn" onclick="toggleWishlist()">
<i class="fa-solid fa-heart"></i>
<span class="badge" id="wishlist-count">0</span>
</button>

<div class="dropdown" id="wishlist-menu">
<ul id="wishlist-items"><li>No items</li></ul>
</div>

<button class="icon-btn" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span class="badge" id="cart-count">0</span>
</button>

<div class="dropdown" id="cart-menu">
<ul id="cart-items"><li>Cart empty</li></ul>
<p class="total" id="cart-total"></p>
<button class="primary-btn">Checkout</button>
</div>

</div>

</nav>

<main>

<section class="products">

<h2>Our Products</h2>

<div class="grid" id="productGrid"></div>

<br>

<button class="primary-btn" onclick="toggleFeedback()">Leave Feedback</button>

</section>

<section class="feedback" id="feedback">

<h2>Feedback</h2>

<form>

<input type="text" placeholder="Name" required>

<input type="email" placeholder="Email" required>

<textarea rows="4" placeholder="Message" required></textarea>

<button class="primary-btn">Submit</button>

</form>

</section>

</main>

<footer>

<p>© 2025 Sneaker Head India</p>

</footer>

<script>

function toggleMenu(){
document.querySelector(".nav-links").classList.toggle("show");
}

const products=[
{name:"NIKE AIR MAX",price:120,img:"image/shoes1.png"},
{name:"NIKE DUNK LOW",price:140,img:"image/shoes2.png"},
{name:"NIKE ZOOM",price:100,img:"image/shoes3.png"}
];

let cart=[];
let wishlist=[];

const grid=document.getElementById("productGrid");

function render(){

grid.innerHTML="";

products.forEach((p,i)=>{

grid.innerHTML+=`

<div class="card">

<div class="card-img">

<img src="${p.img}" alt="${p.name}">

<button class="like-btn" onclick="toggleLike(this,${i})">
<i class="fa-solid fa-heart"></i>
</button>

</div>

<div class="card-body">

<h3>${p.name}</h3>

<p class="price">$${p.price}</p>

<button class="primary-btn" onclick="addCart(${i})">Add to Cart</button>

</div>

</div>

`;

});

}

function addCart(i){

cart.push(products[i]);

gtag('event','add_to_cart',{
item_name:products[i].name,
price:products[i].price
});

document.getElementById("cart-count").textContent=cart.length;

updateCart();

}

function toggleLike(btn,i){

btn.classList.toggle("active");

if(btn.classList.contains("active")){
wishlist.push(products[i]);
}else{
wishlist=wishlist.filter(p=>p.name!==products[i].name);
}

document.getElementById("wishlist-count").textContent=wishlist.length;

updateWishlist();

}

function updateCart(){

const list=document.getElementById("cart-items");

list.innerHTML="";

let total=0;

cart.forEach(item=>{
total+=item.price;
list.innerHTML+=`<li><img src="${item.img}">${item.name}</li>`;
});

document.getElementById("cart-total").textContent="Total: $"+total;

}

function updateWishlist(){

const list=document.getElementById("wishlist-items");

list.innerHTML="";

wishlist.forEach(item=>{
list.innerHTML+=`<li><img src="${item.img}">${item.name}</li>`;
});

}

function toggleCart(){
document.getElementById("cart-menu").classList.toggle("show");
}

function toggleWishlist(){
document.getElementById("wishlist-menu").classList.toggle("show");
}

function toggleFeedback(){

const f=document.getElementById("feedback");

f.style.display=f.style.display==="block"?"none":"block";

}

render();

</script>

</body>
</html>
